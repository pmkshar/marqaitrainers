<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>
  
  <!-- Graduation Cap -->
  <g transform="translate(96, 100)">
    <!-- Cap Base -->
    <rect x="40" y="180" width="240" height="20" rx="4" fill="#FFFFFF"/>
    <!-- Cap Top -->
    <polygon points="80,180 320,180 280,100 120,100" fill="#FFFFFF"/>
    <!-- Button on top -->
    <circle cx="200" cy="100" r="16" fill="#FFD700"/>
    <!-- Tassel -->
    <path d="M200,100 Q200,140 260,180" stroke="#FFD700" stroke-width="6" fill="none"/>
    <circle cx="260" cy="180" r="10" fill="#FFD700"/>
  </g>
  
  <!-- AI Brain Circuit -->
  <g transform="translate(160, 260)">
    <!-- Brain outline -->
    <path d="M96,40 C60,40 40,70 40,100 C40,140 70,160 96,160 C130,160 152,130 152,100 C152,60 130,40 96,40" 
          stroke="#FFFFFF" stroke-width="8" fill="none"/>
    <!-- Neural connections -->
    <line x1="60" y1="80" x2="96" y2="80" stroke="#10B981" stroke-width="4"/>
    <line x1="96" y1="80" x2="132" y2="80" stroke="#10B981" stroke-width="4"/>
    <line x1="60" y1="120" x2="96" y2="120" stroke="#10B981" stroke-width="4"/>
    <line x1="96" y1="120" x2="132" y2="120" stroke="#10B981" stroke-width="4"/>
    <line x1="96" y1="80" x2="96" y2="120" stroke="#10B981" stroke-width="4"/>
    <!-- Nodes -->
    <circle cx="60" cy="80" r="8" fill="#10B981"/>
    <circle cx="96" cy="80" r="10" fill="#FFFFFF"/>
    <circle cx="132" cy="80" r="8" fill="#10B981"/>
    <circle cx="60" cy="120" r="8" fill="#10B981"/>
    <circle cx="96" cy="120" r="10" fill="#FFFFFF"/>
    <circle cx="132" cy="120" r="8" fill="#10B981"/>
  </g>
  
  <!-- Text: MARQAI -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    MARQAI
  </text>
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#10B981" text-anchor="middle">
    COURSES
  </text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>
</svg>