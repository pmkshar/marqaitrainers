<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="40%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="emeraldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)"/>
  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <!-- Top highlight -->
  <rect x="16" y="16" width="480" height="240" rx="108" fill="white" opacity="0.025"/>

  <!-- Ambient glow behind main icon -->
  <ellipse cx="256" cy="240" rx="130" ry="120" fill="#10b981" opacity="0.06"/>

  <!-- === OPEN BOOK === -->
  <g filter="url(#shadow)">
    <!-- Left page -->
    <path d="M256 160 L130 180 L130 330 L256 310 Z" fill="url(#emeraldGrad)" opacity="0.9"/>
    <!-- Right page -->
    <path d="M256 160 L382 180 L382 330 L256 310 Z" fill="url(#emeraldV)" opacity="0.75"/>
    <!-- Spine -->
    <line x1="256" y1="160" x2="256" y2="310" stroke="#059669" stroke-width="2.5" opacity="0.6"/>
    <!-- Page lines left -->
    <line x1="165" y1="215" x2="238" y2="203" stroke="#0f172a" stroke-width="2" opacity="0.15" stroke-linecap="round"/>
    <line x1="165" y1="240" x2="238" y2="228" stroke="#0f172a" stroke-width="2" opacity="0.15" stroke-linecap="round"/>
    <line x1="165" y1="265" x2="238" y2="253" stroke="#0f172a" stroke-width="2" opacity="0.15" stroke-linecap="round"/>
    <!-- Page lines right -->
    <line x1="274" y1="203" x2="347" y2="215" stroke="#0f172a" stroke-width="2" opacity="0.12" stroke-linecap="round"/>
    <line x1="274" y1="228" x2="347" y2="240" stroke="#0f172a" stroke-width="2" opacity="0.12" stroke-linecap="round"/>
    <line x1="274" y1="253" x2="347" y2="265" stroke="#0f172a" stroke-width="2" opacity="0.12" stroke-linecap="round"/>
  </g>

  <!-- === AI SPARKLE (floating above book) === -->
  <g filter="url(#softGlow)">
    <!-- Main 4-point star -->
    <path d="M256 95 L262 115 L282 121 L262 127 L256 147 L250 127 L230 121 L250 115 Z" fill="url(#sparkGrad)"/>
    <!-- Small accent sparkle -->
    <path d="M296 108 L299 116 L307 118 L299 120 L296 128 L293 120 L285 118 L293 116 Z" fill="url(#goldGrad)" opacity="0.8"/>
    <!-- Tiny dot sparkles -->
    <circle cx="222" cy="112" r="3" fill="#6ee7b7" opacity="0.5"/>
    <circle cx="310" cy="135" r="2" fill="#a78bfa" opacity="0.4"/>
  </g>

  <!-- === CIRCUIT NODES (subtle AI accent) === -->
  <g opacity="0.18">
    <circle cx="140" cy="290" r="3" fill="#10b981"/>
    <circle cx="372" cy="290" r="3" fill="#10b981"/>
    <line x1="140" y1="290" x2="155" y2="275" stroke="#10b981" stroke-width="1"/>
    <line x1="372" y1="290" x2="357" y2="275" stroke="#10b981" stroke-width="1"/>
    <circle cx="155" cy="275" r="2" fill="#10b981"/>
    <circle cx="357" cy="275" r="2" fill="#10b981"/>
  </g>

  <!-- === TEXT === -->
  <text x="256" y="400" text-anchor="middle" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif" font-size="56" font-weight="800" letter-spacing="1">
    <tspan fill="#10b981">Marq</tspan><tspan fill="#f1f5f9">AI</tspan>
  </text>
  <text x="256" y="432" text-anchor="middle" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif" font-size="17" font-weight="600" fill="#64748b" letter-spacing="7">
    COURSES
  </text>
</svg>